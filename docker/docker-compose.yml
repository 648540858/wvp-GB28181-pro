services:
  polaris-redis:
    image: redis:latest  # 使用官方Redis镜像
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - media-net
    # ports:
    #   - 6379:6379
    volumes:
      - ./redis/conf/redis.conf:/opt/polaris/redis/redis.conf
      - ./volumes/redis/data/:/data
    environment:
      TZ: "Asia/Shanghai"
    command: redis-server /opt/polaris/redis/redis.conf --appendonly yes

  polaris-mysql:
    image: mysql:8  # 使用官方MySQL 8镜像
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/3306" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - media-net
    environment:
      MYSQL_DATABASE: wvp
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: wvp_user
      MYSQL_PASSWORD: wvp_password
      TZ: Asia/Shanghai
    # ports:
    #   - 3306:3306
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./logs/mysql:/logs
      - ./volumes/mysql/data:/var/lib/mysql  
      - ../数据库/2.7.4/初始化-mysql-2.7.4.sql:/docker-entrypoint-initdb.d/init.sql  # 初始化SQL脚本目录
    command: [
          # '--default-authentication-plugin=mysql_native_password',
          '--innodb-buffer-pool-size=80M',
          '--character-set-server=utf8mb4',
          '--collation-server=utf8mb4_general_ci',
          '--default-time-zone=+8:00',
          '--lower-case-table-names=1'
        ]

  polaris-media:
    image: zlmediakit/zlmediakit:master  # 替换为官方镜像
    restart: always
    networks:
      - media-net
    ports:
      - "${MediaHttp:-80}:${MediaHttp:-80}/tcp"      # [播流]HTTP
      - "${MediaHttps:-443}:${MediaHttps:-443}/tcp"  # [播流]HTTPS
      - "${MediaRtmp:-10001}:${MediaRtmp:-10001}/tcp"  # [收流]RTMP
      - "${MediaRtmp:-10001}:${MediaRtmp:-10001}/udp"  # [收流]RTMP
      - "${MediaRtsp:-10002}:${MediaRtsp:-10002}/tcp"  # [收流]RTSP
      - "${MediaRtsp:-10002}:${MediaRtsp:-10002}/udp"  # [收流]RTSP
      - "${MediaRtp:-10003}:${MediaRtp:-10003}/tcp"    # [收流]RTP
      - "${MediaRtp:-10003}:${MediaRtp:-10003}/udp"    # [收流]RTP
      - "${MediaRtc:-8000}:${MediaRtc:-8000}/tcp"      # [WebRTC]TCP
      - "${MediaRtc:-8000}:${MediaRtc:-8000}/udp"      # [WebRTC]UDP
    volumes:
      - ./volumes/video:/opt/media/bin/www/record/
      - ./logs/media:/opt/media/log/
      - ./media/config.ini:/conf/config.ini
      - ./media/entrypoint.sh:/entrypoint.sh
    environment:
      MediaHttp: ${MediaHttp:-80}
      MediaHttps: ${MediaHttps:-443}
      MediaRtmp: ${MediaRtmp:-10001}
      MediaRtsp: ${MediaRtsp:-10002}
      MediaRtp: ${MediaRtp:-10003}
      MediaRtc: ${MediaRtc:-8000}
      SDP_IP: ${SDP_IP}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  polaris-wvp:
    # 显式指定构建上下文和Dockerfile路径
    build:
      context: ..  # 构建上下文的根路径
      dockerfile: ./docker/wvp/Dockerfile  # 相对于上下文路径的Dockerfile位置
    restart: always
    networks:
      - media-net
    ports:
      - "${WebHttp:-8080}:8080"
      - "${SIP_Port:-8116}:${SIP_Port:-8116}/udp"
      - "${SIP_Port:-8116}:${SIP_Port:-8116}/tcp"
    depends_on:
      - polaris-redis
      - polaris-mysql
      - polaris-media
    volumes:
      - ./wvp/config:/opt/wvp/config
      - ./wvp/wvp/:/opt/ylcx/wvp/
      - ./logs/wvp:/opt/wvp/logs/
      - ./logs/nginx:/var/log/nginx
    environment:
      TZ: "Asia/Shanghai"
      # docker env
      RUN_ENV: "docker"
      # 流链接的IP
      Stream_IP: ${Stream_IP}
      # SDP里的IP
      SDP_IP: ${SDP_IP}
      # [可选] zlm服务器访问WVP所使用的IP, 默认使用127.0.0.1，zlm和wvp没有部署在同一台服务器时必须配置
      ZLM_HOOK_HOST: polaris-wvp
      ZLM_HOST: polaris-media
      ZLM_SERCERT: su6TiedN2rVAmBbIDX0aa0QTiBJLBdcf

      MediaHttp: ${MediaHttp:-80}
      MediaHttps: ${MediaHttps:-443}
      MediaRtmp: ${MediaRtmp:-10001}
      MediaRtsp: ${MediaRtsp:-10002}
      MediaRtp: ${MediaRtp:-10003}
      MediaRtc: ${MediaRtc:-8000}

      REDIS_HOST: polaris-redis
      REDIS_PORT: 6379

      DATABASE_HOST: polaris-mysql
      DATABASE_PORT: 3306
      DATABASE_USER: wvp_user
      DATABASE_PASSWORD: wvp_password

      SIP_ShowIP: ${SIP_ShowIP}
      SIP_Port: ${SIP_Port:-8116}
      SIP_Domain: ${SIP_Domain}
      SIP_Id: ${SIP_Id}
      SIP_Password: ${SIP_Password}

      RecordSip: ${RecordSip}
      RecordPushLive: ${RecordPushLive}
      
networks:
  media-net:
    driver: bridge